<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>登录 | 涛涛小站</title>
  <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
  <style>
    body {
      margin: 0;
      background: var(--van-background);
    }
    #app {
      min-height: 100vh;
    }
    .login-page {
      min-height: 100vh;
      padding: 24px 16px;
      box-sizing: border-box;
    }
    .login-title {
      padding: 48px 0 24px;
      text-align: center;
    }
    .login-form {
      margin-top: 16px;
    }
    .login-action {
      margin: 24px 16px 0;
    }
    .login-footer {
      margin-top: 32px;
      color: var(--van-text-color-3);
      font-size: var(--van-font-size-sm);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-page">
      <div class="login-title">
        <van-icon name="manager-o" size="44"></van-icon>
        <h2>欢迎回来</h2>
        <p>请登录您的账户</p>
      </div>

      <van-form class="login-form" @submit="handleLogin">
        <van-cell-group inset>
          <van-field
            v-model="username"
            name="username"
            label="用户名"
            placeholder="请输入用户名"
            autocomplete="username"
            :rules="[{ required: true, message: '请输入用户名' }]"
          ></van-field>
          <van-field
            v-model="password"
            type="password"
            name="password"
            label="密码"
            placeholder="请输入密码"
            autocomplete="current-password"
            :rules="[{ required: true, message: '请输入密码' }]"
          ></van-field>
        </van-cell-group>

        <div class="login-action">
          <van-button
            round
            block
            type="primary"
            native-type="submit"
            :loading="loading"
            loading-text="登录中"
          >
            登 录
          </van-button>
        </div>
      </van-form>

      <div class="login-footer">© 2024-2026 涛涛小站 - 安全登录</div>
    </div>
  </div>

  <script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const loading = ref(false);

        function getUrlParam(name) {
          return new URLSearchParams(window.location.search).get(name);
        }

        async function handleLogin() {
          if (loading.value) {
            return;
          }

          try {
            loading.value = true;
            const response = await fetch('/user/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: username.value.trim(),
                password: password.value
              })
            });
            const data = await response.json();

            if (data.code === -1) {
              vant.showFailToast(data.msg || '登录失败，请检查用户名和密码');
            } else {
              window.location.replace(getUrlParam('redirectUrl') || '/');
            }
          } catch (error) {
            vant.showFailToast('网络错误，请稍后重试');
          } finally {
            loading.value = false;
          }
        }

        onMounted(function () {
          var input = document.querySelector('input[name="username"]');
          if (input) {
            input.focus();
          }
        });

        return {
          username,
          password,
          loading,
          handleLogin
        };
      }
    }).use(vant).mount('#app');
  </script>
</body>
</html>
